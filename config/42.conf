server {
    listen 8080;
    root ./www;
    index index.html;
    client_max_body_size 0;

    error_page 404 ./www/error_pages/404.html;
    error_page 405 ./www/error_pages/405.html;
    error_page 413 ./www/error_pages/413.html;

    # / responde SÓ GET
    location / {
        allow_methods GET;
        autoindex off;
    }

    # qualquer .bla → POST chamando cgi_test
    location /directory {
        allow_methods GET POST;
        root ./YoupiBanane;
        index youpi.bad_extension;
        cgi .bla ./cgi_tester;
    }

    # /post_body → POST com maxBody 100
    location /post_body {
        allow_methods GET POST;
        client_max_body_size 100;
    }
}
