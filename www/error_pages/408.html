<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>408 Request Timeout</title>
	<link rel="stylesheet" href="/style.css">
</head>
<body>
	<main>
		<div class="card">
			<h1 class="status-4xx" style="font-size:2.5rem; margin:0;">408 <span style="font-size:1.2rem; color:var(--muted); font-weight:600;">Request Timeout</span></h1>
			<p>The connection sat idle for too long (30s) without completing a request, so the server closed it.</p>
			<p><a class="btn secondary" href="/">&larr; Back home</a></p>
		</div>
	</main>
</body>
</html>
