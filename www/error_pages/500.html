<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>500 Internal Server Error</title>
	<link rel="stylesheet" href="/style.css">
</head>
<body>
	<main>
		<div class="card">
			<h1 class="status-5xx" style="font-size:2.5rem; margin:0;">500 <span style="font-size:1.2rem; color:var(--muted); font-weight:600;">Internal Server Error</span></h1>
			<p>Something failed on the server side while handling an otherwise valid request (e.g. an upload directory that's missing or unwritable).</p>
			<p><a class="btn secondary" href="/">&larr; Back home</a></p>
		</div>
	</main>
</body>
</html>
